<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Live — Pendolare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14171c;
    --bg-panel: #1c2029;
    --bg-flap: #0e1015;
    --rule: #2a2f3a;
    --amber: #f0b429;
    --amber-dim: #a8801f;
    --text: #e8e6df;
    --text-muted: #7d828c;
    --red: #e2574c;
    --green: #4caf7d;
    --blue: #4a90d9;
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 1rem 1rem 3rem; }
  header { padding: 1.25rem 0 1rem; border-bottom: 1px solid var(--rule); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; }
  .titolo { font-family: var(--font-mono); font-weight: 700; font-size: 1.3rem; letter-spacing: 0.02em; color: var(--amber); display: flex; align-items: baseline; gap: 0.5rem; }
  .titolo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .ora-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; font-family: var(--font-mono); }
  .btn-refresh { background: none; border: 1px solid var(--rule); border-radius: 6px; padding: 0.5rem 0.8rem; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; font-family: var(--font-sans); }
  .btn-refresh:active { background: var(--bg-panel); }

  .section-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 1.5rem 0 0.6rem; display: flex; align-items: center; gap: 6px; }

  .bus-card { background: var(--bg-panel); border: 1px solid var(--rule); border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 8px; }
  .bus-card.urgente { border-color: var(--red); }
  .bus-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .bus-linea { display: flex; align-items: center; gap: 8px; }
  .badge-linea { background: var(--bg-flap); border: 1px solid var(--rule); color: var(--amber); font-family: var(--font-mono); font-weight: 700; font-size: 0.85rem; padding: 3px 9px; border-radius: 6px; }
  .bus-direzione { font-size: 0.78rem; color: var(--text-muted); }
  .bus-attesa { text-align: right; }
  .bus-attesa-val { font-family: var(--font-mono); font-weight: 700; font-size: 1.3rem; }
  .bus-attesa-val.ok { color: var(--green); }
  .bus-attesa-val.presto { color: var(--amber); }
  .bus-attesa-val.urgente { color: var(--red); }
  .bus-attesa-sub { font-size: 0.68rem; color: var(--text-muted); }
  .bus-dettagli { display: flex; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--rule); font-size: 0.75rem; color: var(--text-muted); }
  .bus-dettagli b { color: var(--text); font-family: var(--font-mono); }
  .rit-neg { color: var(--green); }
  .rit-pos { color: var(--red); }
  .rit-zero { color: var(--text-muted); }

  .tabs { display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { font-size: 0.75rem; padding: 5px 11px; border-radius: 6px; border: 1px solid var(--rule); background: var(--bg-panel); color: var(--text-muted); cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: var(--font-sans); }
  .tab.on { background: rgba(240,180,41,0.12); border-color: var(--amber-dim); color: var(--amber); }

  .toggle-pa { display: flex; gap: 6px; margin-bottom: 10px; }
  .toggle-pa button { flex: 1; font-size: 0.78rem; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--rule); background: var(--bg-panel); color: var(--text-muted); cursor: pointer; font-family: var(--font-sans); }
  .toggle-pa button.on { background: rgba(240,180,41,0.12); border-color: var(--amber-dim); color: var(--amber); font-weight: 600; }

  .treno-list-wrap { border: 1px solid var(--rule); border-radius: 10px; background: var(--bg-panel); overflow: hidden; }
  .treno-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--rule); gap: 8px; }
  .treno-row:last-child { border-bottom: none; }
  .treno-sx { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .treno-num-riga { display: flex; align-items: baseline; gap: 6px; }
  .treno-num { font-family: var(--font-mono); color: var(--amber); font-weight: 700; font-size: 0.85rem; }
  .treno-cat { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
  .treno-dest { font-size: 0.78rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .treno-dx { text-align: right; flex-shrink: 0; }
  .treno-orario { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text); }
  .treno-bin { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }

  .rfi-link-esterno { display: block; text-align: center; font-size: 0.72rem; color: var(--text-muted); padding: 10px 0 4px; }
  .rfi-link-esterno a { color: var(--text-muted); }

  .loading, .vuoto, .errore { text-align: center; padding: 1.5rem 1rem; color: var(--text-muted); font-size: 0.82rem; }
  .errore { color: var(--red); }

  footer { text-align: center; font-size: 0.68rem; color: var(--text-muted); margin-top: 2rem; font-family: var(--font-mono); line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="titolo"><span class="dot"></span>MONITOR LIVE</div>
      <div class="ora-sub" id="oraEl">--:--</div>
    </div>
    <button class="btn-refresh" onclick="aggiornaTutto()">↻ Aggiorna</button>
  </header>

  <div class="section-label">🚌 Bus in tempo reale</div>
  <div id="busEl"><div class="loading">Caricamento...</div></div>

  <div class="section-label">🚆 Treni — tabellone ViaggiaTreno</div>
  <div class="tabs" id="stazioniTabs"></div>
  <div class="toggle-pa" id="togglePA">
    <button id="btnPartenze" onclick="selModalita('partenze')">Partenze</button>
    <button id="btnArrivi" onclick="selModalita('arrivi')">Arrivi</button>
  </div>
  <div class="treno-list-wrap">
    <div id="treniEl"><div class="loading">Caricamento...</div></div>
  </div>
  <div class="rfi-link-esterno" id="rfiLinkEsterno"></div>

  <footer>
    Bus: dati ATAC/Roma Mobilita' in tempo reale (via proxy Cloudflare)<br>
    Treni: dati ViaggiaTreno (via proxy Deno) · aggiornamento automatico
  </footer>

</div>

<script>
// ================================================================
// CONFIGURAZIONE
// ================================================================
const WORKER_URL = 'https://fragrant-shape-56bd.zargonabio.workers.dev';
const DENO_URL = 'https://happy-ferret-5445.j0ky0.deno.net';

const COPPIE_LINEE = [
  { linea: '490', partenza: '74299', arrivo: '82007', destinazione: 'Roma Tiburtina' },
  { linea: '495', partenza: '74299', arrivo: '82005', destinazione: 'Roma Tiburtina' },
  { linea: '80',  partenza: '72661', arrivo: '72685', destinazione: 'Libia (M1)' },
  { linea: '38',  partenza: '72661', arrivo: '72685', destinazione: 'Libia (M1)' },
  { linea: '83',  partenza: '84300', arrivo: '72685', destinazione: 'Libia (M1)' },
];

// Stazioni prioritarie a portata di mano (tab in alto). Ognuna porta sia
// il placeId RFI (per il link di fallback) sia il codice ViaggiaTreno
// (per il tabellone via Deno). In futuro qui si innesta la ricerca
// stazione "on demand" con stazioni_master.json.
const STAZIONI_TRENI = [
  { nome: 'Termini',   placeId: 2416, codViaggiaTreno: 'S08409' },
  { nome: 'Tiburtina', placeId: 2385, codViaggiaTreno: 'S08217' },
  { nome: 'Nomentana', placeId: 3411, codViaggiaTreno: 'S08236' },
  { nome: 'Ostiense',  placeId: 2379, codViaggiaTreno: 'S08406' },
  { nome: 'Orte',      placeId: 1959, codViaggiaTreno: 'S08209' },
  { nome: 'Fiumicino', placeId: 1327, codViaggiaTreno: 'S08411' },
];

let stazioneAttiva = STAZIONI_TRENI[1]; // Tiburtina di default
let modalitaAttiva = 'partenze'; // default: partenze

// ================================================================
// OROLOGIO
// ================================================================
function aggiornaOra() {
  const now = new Date();
  const gg = ['dom','lun','mar','mer','gio','ven','sab'];
  const mm = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  document.getElementById('oraEl').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} · ${gg[now.getDay()]} ${now.getDate()} ${mm[now.getMonth()]}`;
}

// ================================================================
// BUS — chiamata al Worker Cloudflare
// ================================================================
function fmtMin(min) {
  if (min < 1) return 'ora';
  if (min < 60) return `${Math.round(min)}'`;
  return `${Math.floor(min/60)}h${String(Math.round(min%60)).padStart(2,'0')}`;
}

async function caricaBus() {
  const el = document.getElementById('busEl');
  el.innerHTML = '<div class="loading">Caricamento bus...</div>';

  try {
    const risposta = await fetch(`${WORKER_URL}/trip-updates`);
    const json = await risposta.json();

    if (json.errore) {
      el.innerHTML = `<div class="errore">Errore: ${json.errore}</div>`;
      return;
    }

    const ora = Date.now() / 1000;
    const corse = [];

    for (const trip of json.dati) {
      const coppia = COPPIE_LINEE.find(c => c.linea === trip.routeId);
      if (!coppia) continue;

      const stopPartenza = trip.stopTimeUpdates.find(s => s.stopId === coppia.partenza);
      const stopArrivo = trip.stopTimeUpdates.find(s => s.stopId === coppia.arrivo);
      if (!stopPartenza) continue;

      const minutiAttesa = (stopPartenza.arrivalTime - ora) / 60;
      if (minutiAttesa < -2 || minutiAttesa > 45) continue; // fuori range utile

      corse.push({
        linea: trip.routeId,
        destinazione: coppia.destinazione,
        minutiAttesa,
        ritardoPartenza: stopPartenza.arrivalDelay,
        orarioPartenza: stopPartenza.arrivalTime,
        orarioArrivoDestinazione: stopArrivo ? stopArrivo.arrivalTime : null,
        ritardoArrivo: stopArrivo ? stopArrivo.arrivalDelay : null,
      });
    }

    corse.sort((a, b) => a.minutiAttesa - b.minutiAttesa);

    if (corse.length === 0) {
      el.innerHTML = '<div class="vuoto">Nessun bus in arrivo nei prossimi 45 minuti</div>';
      return;
    }

    el.innerHTML = corse.slice(0, 6).map(c => {
      const urgenteClass = c.minutiAttesa < 5 ? 'urgente' : '';
      const attesaClass = c.minutiAttesa < 5 ? 'urgente' : c.minutiAttesa < 12 ? 'presto' : 'ok';
      const ritPartClass = c.ritardoPartenza > 60 ? 'rit-pos' : c.ritardoPartenza < -60 ? 'rit-neg' : 'rit-zero';
      const ritPartTxt = c.ritardoPartenza != null ? `${c.ritardoPartenza > 0 ? '+' : ''}${(c.ritardoPartenza/60).toFixed(1)}'` : '—';

      let durataTxt = '—';
      let ritArrTxt = '—';
      let ritArrClass = 'rit-zero';
      if (c.orarioArrivoDestinazione) {
        const durataMin = (c.orarioArrivoDestinazione - c.orarioPartenza) / 60;
        durataTxt = `${Math.round(durataMin)}'`;
        ritArrClass = c.ritardoArrivo > 60 ? 'rit-pos' : c.ritardoArrivo < -60 ? 'rit-neg' : 'rit-zero';
        ritArrTxt = `${c.ritardoArrivo > 0 ? '+' : ''}${(c.ritardoArrivo/60).toFixed(1)}'`;
      }

      return `
        <div class="bus-card ${urgenteClass}">
          <div class="bus-top">
            <div class="bus-linea">
              <span class="badge-linea">${c.linea}</span>
              <span class="bus-direzione">→ ${c.destinazione}</span>
            </div>
            <div class="bus-attesa">
              <div class="bus-attesa-val ${attesaClass}">${fmtMin(c.minutiAttesa)}</div>
              <div class="bus-attesa-sub">alla fermata</div>
            </div>
          </div>
          <div class="bus-dettagli">
            <span>Ritardo: <b class="${ritPartClass}">${ritPartTxt}</b></span>
            <span>Durata tragitto: <b>${durataTxt}</b></span>
            <span>Ritardo arrivo: <b class="${ritArrClass}">${ritArrTxt}</b></span>
          </div>
        </div>`;
    }).join('');

  } catch (errore) {
    el.innerHTML = `<div class="errore">Errore di connessione: ${errore.message}</div>`;
  }
}

// ================================================================
// TRENI — tabellone via Deno (ViaggiaTreno)
// ================================================================
function renderTabsStazioni() {
  const tabsEl = document.getElementById('stazioniTabs');
  tabsEl.innerHTML = STAZIONI_TRENI.map(s =>
    `<button class="tab${s.codViaggiaTreno === stazioneAttiva.codViaggiaTreno ? ' on' : ''}" onclick="selStazione('${s.codViaggiaTreno}')">${s.nome}</button>`
  ).join('');
}

function renderTogglePA() {
  document.getElementById('btnPartenze').classList.toggle('on', modalitaAttiva === 'partenze');
  document.getElementById('btnArrivi').classList.toggle('on', modalitaAttiva === 'arrivi');
}

function formattaRitardoTreno(min) {
  if (min === null || min === undefined) return '<span class="rit-zero">—</span>';
  const cls = min > 0 ? 'rit-pos' : min < 0 ? 'rit-neg' : 'rit-zero';
  const segno = min > 0 ? '+' : '';
  return `<span class="${cls}">${segno}${min}'</span>`;
}

async function caricaTreni() {
  const el = document.getElementById('treniEl');
  el.innerHTML = '<div class="loading">Caricamento tabellone...</div>';

  try {
    const risposta = await fetch(`${DENO_URL}/tabellone/${stazioneAttiva.codViaggiaTreno}`);
    const json = await risposta.json();

    if (json.errore) {
      el.innerHTML = `<div class="errore">Errore: ${json.errore}</div>`;
      return;
    }

    const lista = (modalitaAttiva === 'partenze' ? json.partenze : json.arrivi) || [];

    // Filtro: solo i prossimi ~60' + ultima ora, escludiamo il "passato oltre ora"
    const filtrata = lista
      .filter(t => t.stato !== 'passato_oltre_ora')
      .sort((a, b) => (a.orarioProgrammato || '').localeCompare(b.orarioProgrammato || ''));

    if (filtrata.length === 0) {
      el.innerHTML = '<div class="vuoto">Nessun treno nella finestra attuale</div>';
      return;
    }

    el.innerHTML = filtrata.map(t => {
      const destOrig = modalitaAttiva === 'partenze' ? t.destinazione : t.origine;
      const binario = t.binarioEffettivo || t.binarioProgrammato || '—';
      return `
        <div class="treno-row">
          <div class="treno-sx">
            <div class="treno-num-riga">
              <span class="treno-num">${t.numeroTreno}</span>
              <span class="treno-cat">${t.categoria || ''}</span>
            </div>
            <div class="treno-dest">${destOrig || '—'}</div>
          </div>
          <div class="treno-dx">
            <div class="treno-orario">${t.orarioProgrammato || '—'} ${formattaRitardoTreno(t.ritardo)}</div>
            <div class="treno-bin">bin. ${binario}</div>
          </div>
        </div>`;
    }).join('');

  } catch (errore) {
    el.innerHTML = `<div class="errore">Errore di connessione: ${errore.message}</div>`;
  }
}

function aggiornaLinkRfi() {
  const url = `https://iechub.rfi.it/ArriviPartenze/ArrivalsDepartures/Monitor?placeId=${stazioneAttiva.placeId}&arrivals=${modalitaAttiva === 'arrivi'}`;
  document.getElementById('rfiLinkEsterno').innerHTML =
    `<a href="${url}" target="_blank" rel="noopener">Apri il tabellone ufficiale RFI ↗</a>`;
}

function selStazione(codViaggiaTreno) {
  stazioneAttiva = STAZIONI_TRENI.find(s => s.codViaggiaTreno === codViaggiaTreno);
  renderTabsStazioni();
  aggiornaLinkRfi();
  caricaTreni();
}

function selModalita(modalita) {
  modalitaAttiva = modalita;
  renderTogglePA();
  aggiornaLinkRfi();
  caricaTreni();
}

// ================================================================
// AVVIO
// ================================================================
function aggiornaTutto() {
  aggiornaOra();
  caricaBus();
  caricaTreni();
}

aggiornaOra();
renderTabsStazioni();
renderTogglePA();
aggiornaLinkRfi();
caricaBus();
caricaTreni();
setInterval(aggiornaOra, 30000);
</script>
</body>
</html>
